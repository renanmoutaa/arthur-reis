server {
    listen 80;
    listen [::]:80;
    server_name biblioteca.cultura.am.gov.br;
    
    # Redireciona HTTP para HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name biblioteca.cultura.am.gov.br;

    # Certificados SSL (Atualize os caminhos se necessário)
    ssl_certificate /etc/ssl/certificado/cultura_am_gov_br.crt;
    ssl_certificate_key /etc/ssl/certificado/cultura_am_gov_br.key;

    # Otimizações de SSL
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Configurações de Proxy Comuns
    proxy_connect_timeout 300;
    proxy_send_timeout 300;
    proxy_read_timeout 300;
    send_timeout 300;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;

    # --- FRONTEND (React / Vite) ---
    location / {
        proxy_pass http://localhost:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # --- BACKEND API (NestJS) ---
    # Encaminha rotas de API para a porta 3000
    location ~ ^/(books|auth|users) {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Aumentar limite de upload para capas de livros
    client_max_body_size 10M;
}
